<!DOCTYPE html>
<html>
<head>
    <title>Decrypt</title>
</head>
<body>

<h2>Dekripsi Pesan</h2>

<form method="POST" enctype="multipart/form-data">

    <input type="file"
           name="image"
           required>

    <br><br>

    <input type="text"
           name="key"
           placeholder="Kunci"
           required>

    <br><br>

    <input type="text"
           name="r"
           placeholder="R Chaos"
           required>

    <br><br>

    <input type="text"
           name="x0"
           placeholder="X0 Chaos"
           required>

    <br><br>

    <button type="submit">
        Decrypt
    </button>

</form>

{% if result %}

<h3>Hasil:</h3>

<p>{{ result }}</p>

{% endif %}

</body>
</html>
